<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../ticket/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css"
    />
    
    <title>form Page</title>
  </head>
  <body>
    <div id="head">
        <h1>은밀한 티켓 할인점</h1>
    
    <div id="nav">
        <ul>
            <li><a href="#musical">뮤지컬</a></li>
            <li><a href="#concert">콘서트</a></li>
            <li><a href="#daehakro">연극</a></li>
            <li><a href="#art">전시</a></li>
        </ul>
    </div>
    </div>
            <div class="ticket-layout">
              <section class="ticket-box image-box">
                <img src="https://i.ibb.co/tMQBh6bL/image.png" alt="뮤지컬 데스노트 포스터" class="poster-image" />
              </section>

              <section class="ticket-box info-box">
                <table class="table1">
                  <colgroup>
                    <col/>
                    <col />
                  </colgroup>
                  <tbody>
                    <tr>
                      <td><b>장소</b></td>
                      <td>디큐브 링크아트센터</td>
                    </tr>
                    <tr>
                      <td><b>공연기간</b></td>
                      <td>2025.10.14 - 2026.05.25</td>
                    </tr>
                    <tr>
                      <td><b>공연 시간</b></td>
                      <td>165분 (인터미션 20분 포함)</td>
                    </tr>
                    <tr>
                      <td><b>가격</b></td>
                      <td><b>VIP석</b> 170,000원</td>
                    </tr>
                    <tr>
                      <td></td>
                      <td><b>R석</b> 140,000원</td>
                    </tr>
                    <tr>
                      <td></td>
                      <td><b>S석</b> 110,000원</td>
                    </tr>
                    <tr>
                      <td></td>
                      <td><b>A석</b> 80,000원</td>
                    </tr>
                  </tbody>
                </table>
              </section>

              <section class="ticket-box form-box">
                <form>
                  <fieldset>
                    <legend>예약 정보</legend>

                    <label for="product">예매 상품:</label><br />
                    <select id="product" name="product">
                      <option value="death-note" selected>뮤지컬 데스노트</option>
                    </select><br />

                    <label for="name">예매자 성명 :</label>
                    <input type="text" id="name" size="8" maxlength="10" autofocus required /><br />

                    <label for="tel">예매자 연락처 :</label>
                    <input type="tel" id="tel" value="010" maxlength="11" /><br />

                    <label for="seat-grade">좌석 등급 선택:</label>
                    <select id="seat-grade" name="seat-grade">
                      <option value="vip" selected>VIP석</option>
                      <option value="r">R석</option>
                      <option value="s">S석</option>
                      <option value="a">A석</option>
                    </select><br />

                    <label for="ticket-count">예매 수량 :</label>
                    <input type="number" id="ticket-count" min="0" max="10" value="1" />
                  </fieldset>

                  <button type="submit">예약하기</button>
                  <button type="reset">취소하기</button>
                </form>
              </section>
            </div>
    </div>
  </body>
</html>
